name: Code Linting

on:
  push:
    branches: [ main ]

jobs:
  eslint:
    name: Run ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Lint
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint